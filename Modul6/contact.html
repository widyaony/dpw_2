<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Tutorial CSS Framework</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    /* Sticky footer */
    html, body {
      height: 100%;
    }
    body {
      display: flex;
      flex-direction: column;
    }
    main {
      flex: 1;
    }
    /* Kotak abu-abu muda untuk header */
    .header-box {
      background-color: #f8f9fa; /* abu-abu muda */
      border-radius: 8px;
      padding: 30px;
    }
    /* Jarak tambahan untuk form agar lebih ke bawah */
    .form-section {
      margin-top: 50px;
    }         
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-secondary">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="#">My Website</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="home.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link" href="services.html">Services</a></li>
          <li class="nav-item"><a class="nav-link" href="portfolio.html">Portfolio</a></li>
          <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Header + Form -->
  <main>
    <header class="container text-center my-5">
      <div class="header-box">
        <h1 class="display-4">Contact Us</h1>
        <p class="lead">Silahkan hubungi kami melalui form berikut.</p>
        <p><strong>Nama:</strong> Widya Ony Yusnita Rahayu | <strong>NIM:</strong> 253307041</p>
      </div>
    </header>

    <div class="container form-section">
      <form>
        <div class="mb-3">
          <label for="name" class="form-label">Nama</label>
          <input type="text" class="form-control" id="name" required>
        </div>
        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <input type="email" class="form-control" id="email" required>
        </div>
        <div class="mb-3">
          <label for="message" class="form-label">Pesan</label>
          <textarea class="form-control" id="message" rows="4" required></textarea>
        </div>
        <!-- Tombol Kirim/Submit di bawah form -->
        <button type="submit" class="btn btn-primary w-100">Kirim</button>
      </form>
    </div>
  </main>

  <!-- Sticky Footer -->
  <footer class="bg-dark text-white text-center p-3 mt-auto">
    &copy; 2026 CSS Framework | Nama: Widya Ony Yusnita Rahayu | NIM: 253307041
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
