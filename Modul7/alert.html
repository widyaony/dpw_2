<html>
    <head>
        <title>Contoh Program Javascript</title>
    </head>
    <body>
        <script language="Javascript">
            alert("Hallo :");
        </script>

        <h3>Kesimpulan</h3>
        <p>
            Program di atas menunjukkan penggunaan dasar JavaScript untuk menampilkan pesan

            atau uji coba awal dalam memahami interaksi JavaScript dengan browser.
        </p>
    </body>
</html>
