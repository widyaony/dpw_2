<html>
    <head>
        <style>
            div{
                border: 1px solid;
                margin: 0 auto;
                height: 100px;
                width: 500px;
                background: skyblue;}
                span{
                    display: block;
                    background: red;}
        </style>
    </head>
    <body>
        <div>
            Ini adalah elemen pertama menggunakan DIV 
            <div>
                Ini DIV di dalam DIV namun membuat elemen blok baru 
                <span> Ini SPAN di dalam DIV tidak membuat elemen blok baru</span>
            </div>

             <!-- Kesimpulan -->
        <div class="kesimpulan">
            <p>Kesimpulan: DIV adalah elemen blok, sedangkan SPAN biasanya inline. <br> Namun, dengan CSS bisa diubah tampilannya.</p>
        </div>

        </div>
    </body>
</html>
